name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ github.ref_name }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4

      - name: Publish release from tag
        run: |
          version="${TAG_NAME#v}"
          gh release create "${TAG_NAME}" \
            enterprise-attack/enterprise-attack.json \
            mobile-attack/mobile-attack.json \
            ics-attack/ics-attack.json \
            --repo "${REPOSITORY}" \
            --verify-tag \
            --title "ATT&CK version ${version}" \
            --notes "This release provides ATT&CK version ${version} in STIX 2.1 format"
